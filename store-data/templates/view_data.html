<!DOCTYPE html>
<html>

<head>

<title>View Data</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

<h2>Stored Users</h2>

<table>

<tr>

<th>ID</th>

<th>Name</th>

<th>Surname</th>

<th>Email</th>

<th>Mobile</th>

<th>Age</th>

<th>Gender</th>

</tr>

{% for row in data %}

<tr>

<td>{{ row[0] }}</td>

<td>{{ row[1] }}</td>

<td>{{ row[2] }}</td>

<td>{{ row[3] }}</td>

<td>{{ row[4] }}</td>

<td>{{ row[5] }}</td>

<td>{{ row[6] }}</td>

</tr>

{% endfor %}

</table>

<br>

<a href="/">Home</a>

</div>

</body>

</html>
